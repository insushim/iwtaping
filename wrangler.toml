name = "typingverse"
compatibility_date = "2024-09-23"
pages_build_output_dir = "out"

# 백엔드 API는 functions/ 디렉터리의 Pages Functions로 제공된다.
# (Next.js가 output:"export" 라 Route Handler를 쓸 수 없다.)
#
# 준비 절차:
#   npx wrangler d1 create typingverse
#   npx wrangler d1 execute typingverse --file=./schema.sql --remote
#   npx wrangler pages secret put AUTH_SECRET
[[d1_databases]]
binding = "DB"
database_name = "typingverse"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
