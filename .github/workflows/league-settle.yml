name: League weekly settlement

# Cloudflare Pages Functions에는 Cron Trigger가 없어(Workers 전용) 정산을
# HTTP 엔드포인트로 두고 여기서 두드린다. 상세는 docs/DEPLOYMENT.md §4.5.
#
# KST 월요일 00:05 = UTC 일요일 15:05
on:
  schedule:
    - cron: '5 15 * * SUN'
  workflow_dispatch:
    inputs:
      weekKey:
        description: '재정산할 주 (YYYY-Www). 비우면 지난주'
        required: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - name: Settle previous week
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WEEK_KEY: ${{ github.event.inputs.weekKey }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "SITE_URL / CRON_SECRET 리포지토리 시크릿이 필요합니다"
            exit 1
          fi

          body='{}'
          if [ -n "${WEEK_KEY:-}" ]; then
            body="{\"weekKey\":\"${WEEK_KEY}\"}"
          fi

          # done:false면 처리할 버킷이 남았다는 뜻 — 끝날 때까지 반복 호출한다.
          # (엔드포인트는 멱등이라 중복 호출이 승급을 두 번 시키지 않는다)
          for attempt in $(seq 1 20); do
            response=$(curl -sS --fail-with-body -X POST \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              -d "${body}" \
              "${SITE_URL%/}/api/league/settle")
            echo "[$attempt] $response"

            case "$response" in
              *'"done":true'*) echo "정산 완료"; exit 0 ;;
            esac
            sleep 5
          done

          echo "20회 호출 후에도 정산이 끝나지 않았습니다 — 수동 확인 필요"
          exit 1
