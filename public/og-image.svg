<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A2E"/>
      <stop offset="50%" style="stop-color:#1A1A4E"/>
      <stop offset="100%" style="stop-color:#0D0D35"/>
    </linearGradient>
    <linearGradient id="tvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A29BFE"/>
      <stop offset="100%" style="stop-color:#6C5CE7"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7CF7"/>
      <stop offset="100%" style="stop-color:#6C5CE7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="120" cy="60" r="2" fill="#E8E8FF" opacity="0.6"/>
  <circle cx="1000" cy="100" r="1.5" fill="#A29BFE" opacity="0.5"/>
  <circle cx="300" cy="500" r="1.5" fill="#E8E8FF" opacity="0.4"/>
  <circle cx="900" cy="400" r="2" fill="#A29BFE" opacity="0.6"/>
  <circle cx="150" cy="350" r="1" fill="#E8E8FF" opacity="0.5"/>
  <circle cx="1050" cy="520" r="1.5" fill="#E8E8FF" opacity="0.4"/>
  <!-- Logo TV -->
  <text x="600" y="250" text-anchor="middle" fill="url(#tvGrad)" font-size="140" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" letter-spacing="-5">TV</text>
  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" fill="#E8E8FF" font-size="52" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" letter-spacing="3">TypingVerse</text>
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" fill="#A29BFE" font-size="26" font-family="'Noto Sans KR', sans-serif" opacity="0.8">손끝으로 여는 무한한 세계</text>
  <!-- Keyboard keys -->
  <g transform="translate(420,420)">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="rgba(108,92,231,0.3)" stroke="rgba(162,155,254,0.3)" stroke-width="1"/>
    <text x="25" y="32" text-anchor="middle" fill="#E8E8FF" font-size="20" font-weight="700" font-family="monospace">T</text>
    <rect x="60" y="0" width="50" height="50" rx="8" fill="rgba(108,92,231,0.3)" stroke="rgba(162,155,254,0.3)" stroke-width="1"/>
    <text x="85" y="32" text-anchor="middle" fill="#E8E8FF" font-size="20" font-weight="700" font-family="monospace">Y</text>
    <rect x="120" y="0" width="50" height="50" rx="8" fill="rgba(108,92,231,0.3)" stroke="rgba(162,155,254,0.3)" stroke-width="1"/>
    <text x="145" y="32" text-anchor="middle" fill="#E8E8FF" font-size="20" font-weight="700" font-family="monospace">P</text>
    <rect x="180" y="0" width="50" height="50" rx="8" fill="#A29BFE" stroke="rgba(162,155,254,0.5)" stroke-width="1"/>
    <text x="205" y="32" text-anchor="middle" fill="#FFF" font-size="20" font-weight="700" font-family="monospace">I</text>
    <rect x="240" y="0" width="50" height="50" rx="8" fill="rgba(108,92,231,0.3)" stroke="rgba(162,155,254,0.3)" stroke-width="1"/>
    <text x="265" y="32" text-anchor="middle" fill="#E8E8FF" font-size="20" font-weight="700" font-family="monospace">N</text>
    <rect x="300" y="0" width="50" height="50" rx="8" fill="rgba(108,92,231,0.3)" stroke="rgba(162,155,254,0.3)" stroke-width="1"/>
    <text x="325" y="32" text-anchor="middle" fill="#E8E8FF" font-size="20" font-weight="700" font-family="monospace">G</text>
  </g>
  <!-- Accent dot -->
  <circle cx="1020" cy="120" r="8" fill="#00D2D3"/>
</svg>
